<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <style>
        @page {
            size: A4 landscape;
            margin: 15mm;
        }

        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            color: #333;
            margin: 0;
            padding: 0;
        }

        /* ─── Page break per issue ──────────────────────── */
        .issue-report-page {
            page-break-after: always;
        }

        .issue-report-page:last-child {
            page-break-after: avoid;
        }

        /* ─── Header ──────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .header-logo {
            max-width: 150px;
            max-height: 50px;
            object-fit: contain;
        }

        .header-title {
            flex: 1;
            text-align: center;
            font-size: 22px;
            font-weight: 800;
        }

        .header-empty {
            width: 150px;
        }

        /* ─── Main Table Structure ────────────────────── */
        .issue-report-table {
            table-layout: fixed !important;
            width: 100% !important;
            border-collapse: collapse;
            word-break: break-all;
        }

        th,
        td {
            border: 1px solid #777;
            padding: 10px 12px;
            text-align: center;
            font-size: 14px;
        }

        th {
            background-color: #d1d5db;
            font-weight: bold;
        }

        .label-cell {
            background-color: #d1d5db;
            font-weight: bold;
        }

        .data-cell {
            background-color: #fff;
            text-align: center;
        }

        /* User-specified Fixed Widths (requested: No=Struct=Work=15%) */
        .col-no-label {
            width: 15%;
        }

        .col-struct-label {
            width: 15%;
        }

        .col-work-label {
            width: 15%;
        }

        .col-desc-label {
            width: 30%;
        }

        .col-res-label {
            width: 25%;
        }

        .desc-cell {
            text-align: left;
            vertical-align: top;
            min-height: 36px;
        }

        /* ─── Image Container: Strict 50:50 ratio ─────── */
        .image-half-cell {
            width: 50% !important;
            min-width: 50% !important;
            max-width: 50% !important;
            height: 380px !important;
            text-align: center;
            vertical-align: middle;
            padding: 8px !important;
            box-sizing: border-box !important;
        }

        .image-half-cell img {
            width: 100% !important;
            height: 100% !important;
            max-width: 100% !important;
            max-height: 100% !important;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        /* ─── Single Image: Full width ────────────────── */
        .image-full-cell {
            width: 100% !important;
            height: 420px !important;
            text-align: center;
            vertical-align: middle;
            padding: 10px !important;
            box-sizing: border-box !important;
        }

        .centered-image {
            width: 100% !important;
            height: 100% !important;
            max-width: 100% !important;
            max-height: 100% !important;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
